name: Deploy BlueStone Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Backup .env file
        run: |
          mkdir -p ~/env-backups
          if [ -f ~/actions-runner/_work/blue_stone/blue_stone/backend/.env ]; then
            cp ~/actions-runner/_work/blue_stone/blue_stone/backend/.env ~/env-backups/backend.env
            echo "Backed up .env file to ~/env-backups/backend.env"
          else
            echo "No .env file to backup"
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore .env file
        run: |
          if [ -f ~/env-backups/backend.env ]; then
            cp ~/env-backups/backend.env ./backend/.env
            echo "Restored .env file from ~/env-backups/backend.env"
          else
            echo "No .env backup found - creating from .env.example if exists"
            if [ -f ./backend/.env.example ]; then
              cp ./backend/.env.example ./backend/.env
              echo "Created .env from .env.example - PLEASE UPDATE WITH PRODUCTION VALUES"
            fi
          fi

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          npm install
          echo "Dependencies installed!"

      - name: Verify .env exists
        working-directory: ./backend
        run: |
          if [ -f .env ]; then
            echo ".env file exists"
          else
            echo "ERROR: .env file missing!"
            exit 1
          fi

      - name: Restart backend server
        run: |
          pm2 restart bluestone-api || pm2 start server.js --name bluestone-api --cwd ~/actions-runner/_work/blue_stone/blue_stone/backend
          pm2 save
          sleep 3
          pm2 logs bluestone-api --lines 5 --nostream
          echo "Backend deployed successfully!"