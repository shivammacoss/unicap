name: Deploy BlueStone Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Backup .env file
        run: |
          mkdir -p ~/env-backups
          if [ -f ~/actions-runner/_work/blue_stone/blue_stone/frontend/.env ]; then
            cp ~/actions-runner/_work/blue_stone/blue_stone/frontend/.env ~/env-backups/frontend.env
            echo "Backed up .env file to ~/env-backups/frontend.env"
          else
            echo "No .env file to backup"
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore .env file
        run: |
          if [ -f ~/env-backups/frontend.env ]; then
            cp ~/env-backups/frontend.env ./frontend/.env
            echo "Restored .env file from ~/env-backups/frontend.env"
          else
            echo "No .env backup found - creating production .env"
            echo "VITE_API_URL=https://api.bluestoneexchange.com" > ./frontend/.env
            echo "VITE_TRADE_URL=https://trade.bluestoneexchange.com" >> ./frontend/.env
            echo "Created production .env file"
          fi
          cat ./frontend/.env

      - name: Install frontend dependencies (only if package.json changed)
        working-directory: ./frontend
        run: |
          if [ ! -d "node_modules" ] || [ "package.json" -nt "node_modules" ]; then
            echo "Installing dependencies..."
            npm ci
          else
            echo "Dependencies up to date, skipping install"
          fi
          echo "Dependencies ready!"

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm run build
          echo "Frontend built successfully!"
